<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Sinh Nhật PNJ 38 Năm</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Montserrat+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Montserrat', 'Montserrat Arabic', sans-serif !important; }
        body { background-color: #fdfbf0; color: #003865; }
        .text-pnj-gold { color: #BFA37C; }
        .text-pnj-blue { color: #003865; }
        .bg-pnj-gold { background-color: #BFA37C; }
        .bg-pnj-blue { background-color: #003865; }
        .border-pnj-gold { border-color: #BFA37C; }
        
        .funnel-block { background-color: #003865; border-top: 4px solid #BFA37C; border-radius: 1rem; color: white; box-shadow: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(191, 163, 124, 0.3); backdrop-filter: blur(8px); }
        .flat-inner-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(191, 163, 124, 0.4); border-radius: 0.5rem; color: white; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #BFA37C; border-radius: 3px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconMegaphone = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg>;
        const IconMousePointer = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg>;
        const IconCart = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        const IconStore = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"></path><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"></path><path d="M2 7h20"></path><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"></path></svg>;
        const IconArrowDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#BFA37C" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="animate-bounce"><path d="M12 5v14"></path><path d="m19 12-7 7-7-7"></path></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#BFA37C" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconWorldWideWeb = () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
        const IconEnvelope = () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
        const IconImage = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>;

        // ================= DỮ LIỆU MẶC ĐỊNH (Fallback) =================
        const defaultFunnelData = {
            reportDate: "19/04/2026",
            totalRevenue: "158 Tỷ",
            totalCustomers: "13,803",
            reach: "7.07M",
            campHO: "3.4M",
            campNhan: "1.8M",
            localAds: "1.82M",
            interaction: "745K",
            userInWeb: "646,627",
            inboxHO: "16K",
            inboxCN: "65K",
            clickGMB: "17,685",
            revKHC: "109 Tỷ",
            khKHC: "7.945 Khách",
            revKHM: "49 Tỷ",
            khKHM: "5.858 Khách"
        };

        const defaultAdsData = [
            { id: 1, image: "ads-zmp-carousel.png", channel: "Facebook", campaign: "Campaign HO", title: "Chương trình truyền thông hoạt động SN PNJ", format: "Facebook Carousel" },
            { id: 2, image: "ads-rtl-snpnj.png", channel: "Facebook", campaign: "Campaign HO", title: "Chương trình truyền thông hoạt động SN PNJ", format: "Facebook Carousel Ads" },
            { id: 3, image: "disney-ads-snpnj.png", channel: "Facebook", campaign: "Campaign Nhãn Hàng", title: "Chương trình SN PNJ Cùng Nhãn Hàng Disney", format: "Facebook Collection Ads" },
            { id: 4, image: "sanrio-ads.png", channel: "Google", campaign: "Campaign Nhãn Hàng", title: "Chương trình Push Sale Ưu Đãi Nhãn Hàng", format: "Google Display Network" },
            { id: 5, image: "trendy-ads.png", channel: "Google", campaign: "Campaign Nhãn Hàng", title: "Chương trình Push Sale BST Doraemon", format: "Google Search Ads" },
            { id: 6, image: "watch-ads-snpnj.png", channel: "Facebook", campaign: "Campaign Nhãn Hàng", title: "Chương trình SN PNJ Cùng Nhãn Hàng Watch", format: "Facebook Carousel Ads" },
            { id: 7, image: "style-ads-snpnj.png", channel: "Zalo", campaign: "Campaign Nhãn Hàng", title: "Chương trình SN PNJ Cùng Style by PNJ", format: "Zalo Official Account" },
            { id: 8, image: "mancode-ads-snpnj-collect.png", channel: "Zalo", campaign: "Campaign Nhãn Hàng", title: "Chương trình SN PNJ Cùng MANCODE", format: "Zalo Broadcast" },
            { id: 9, image: "arta-ads-snpnj.png", channel: "Facebook", campaign: "Campaign Nhãn Hàng", title: "Chương trình SN PNJ Cùng Nhãn Hàng ARTA", format: "Facebook Carousel Ads" },
            { id: 10, image: "hcm-local-ads-2.png", channel: "Facebook", campaign: "Local Ads", title: "Chương trình Push Sale Chi Nhánh HCM", format: "Facebook Post" },
            { id: 11, image: "mbc-local-ads.png", channel: "Facebook", campaign: "Local Ads", title: "Chương trình Push Sale Chi Nhánh MBC", format: "Facebook Post" },
            { id: 12, image: "mtg-local-ads.png", channel: "Google", campaign: "Local Ads", title: "Chương trình Push Sale Chi Nhánh MTG", format: "Google Maps Local" },
            { id: 13, image: "mty-local-ads.png", channel: "Zalo", campaign: "Local Ads", title: "Chương trình Push Sale Chi Nhánh MTY", format: "Zalo Ads" },
            { id: 14, image: "tnn-local-ads.png", channel: "Facebook", campaign: "Local Ads", title: "Chương trình Push Sale Chi Nhánh TNN", format: "Facebook Post" }
        ];

        // ================= CẤU HÌNH LINK GOOGLE SHEETS =================
        const LINK_GOOGLE_SHEET_FUNNEL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdqb34waPwXhUxuYGmAMx_tBw8D-UezoLCMmKgi0KfJB9HmBDuDm_NX9BIdq7HS4ecu3fadSZ70Ss6/pub?gid=0&single=true&output=csv"; 
        const LINK_GOOGLE_SHEET_ADS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdqb34waPwXhUxuYGmAMx_tBw8D-UezoLCMmKgi0KfJB9HmBDuDm_NX9BIdq7HS4ecu3fadSZ70Ss6/pub?gid=1071109814&single=true&output=csv";

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('funnel');
            const [funnelData, setFunnelData] = React.useState(defaultFunnelData);
            const [adsData, setAdsData] = React.useState(defaultAdsData);

            // Sync Data từ Google Sheets
            React.useEffect(() => {
                // Fetch Funnel
                if (LINK_GOOGLE_SHEET_FUNNEL.includes("http")) {
                    Papa.parse(LINK_GOOGLE_SHEET_FUNNEL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            let updatedFunnel = { ...defaultFunnelData };
                            results.data.forEach(row => {
                                if (row.Metric && row.Value) {
                                    updatedFunnel[row.Metric.trim()] = row.Value.trim();
                                }
                            });
                            setFunnelData(updatedFunnel);
                        }
                    });
                }
                
                // Fetch Ads
                if (LINK_GOOGLE_SHEET_ADS.includes("http")) {
                    Papa.parse(LINK_GOOGLE_SHEET_ADS, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            const parsedAds = results.data
                                .filter(row => row.ID)
                                .map(row => ({
                                    id: row.ID,
                                    image: row.Image,
                                    channel: row.Channel || "Facebook",
                                    campaign: row.Campaign,
                                    title: row.Title,
                                    format: row.Format
                                }));
                            if(parsedAds.length > 0) {
                                setAdsData(parsedAds);
                            }
                        }
                    });
                }
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1200px] mx-auto relative overflow-hidden">
                    {/* Background Detail */}
                    <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full">
                            <defs>
                                <radialGradient id="pnjGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                                    <stop offset="0%" stopColor="#BFA37C" stopOpacity="0.4" />
                                    <stop offset="100%" stopColor="#BFA37C" stopOpacity="0" />
                                </radialGradient>
                            </defs>
                            <circle cx="20" cy="20" r="50" fill="url(#pnjGradient)" />
                            <circle cx="80" cy="80" r="40" fill="url(#pnjGradient)" />
                        </svg>
                    </div>

                    {/* Header Section */}
                    <header className="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-pnj-gold/30 pb-6 relative z-10">
                        <div>
                            <h1 className="text-3xl md:text-4xl font-extrabold text-pnj-blue tracking-tight uppercase">
                                BÁO CÁO DIGITAL <br />
                                <span className="text-pnj-gold">SINH NHẬT PNJ 38 NĂM</span>
                            </h1>
                            <p className="text-pnj-blue/80 font-semibold mt-2 text-sm md:text-base">
                                Giai đoạn: 04/10/2026 – 05/03/2026 &nbsp;|&nbsp; Ngày cập nhật: {funnelData.reportDate} &nbsp;|&nbsp; Nguồn: Omni Digital
                            </p>
                        </div>

                        {/* Top KPIs */}
                        <div className="flex gap-4">
                            <div className="glass-card p-4 rounded-xl w-40 md:w-48 text-center shadow-sm">
                                <p className="text-pnj-blue/70 text-xs font-bold mb-1 uppercase tracking-wider">Doanh Thu</p>
                                <h2 className="text-2xl md:text-3xl font-black text-pnj-gold">{funnelData.totalRevenue}</h2>
                                <p className="flex justify-center items-center gap-1 mt-1 text-pnj-gold text-xs font-bold"><IconTrendingUp /> +66% YoY</p>
                            </div>
                            <div className="glass-card p-4 rounded-xl w-40 md:w-48 text-center shadow-sm">
                                <p className="text-pnj-blue/70 text-xs font-bold mb-1 uppercase tracking-wider">Khách Hàng</p>
                                <h2 className="text-2xl md:text-3xl font-black text-pnj-blue">{funnelData.totalCustomers}</h2>
                                <p className="flex justify-center items-center gap-1 mt-1 text-pnj-gold text-xs font-bold"><IconTrendingUp /> +50% YoY</p>
                            </div>
                        </div>
                    </header>

                    {/* Tab Navigation */}
                    <div className="flex justify-center gap-4 mb-8 relative z-10">
                        <button onClick={() => setActiveTab('funnel')} className={`flex items-center gap-2 px-6 py-2.5 font-bold rounded-full border-2 transition-all duration-300 ${activeTab === 'funnel' ? 'bg-pnj-blue text-white border-pnj-blue shadow-md' : 'bg-transparent text-pnj-blue border-pnj-blue hover:bg-pnj-blue/10'}`}>
                            <IconFilter /> Báo Cáo Phễu (Funnel)
                        </button>
                        <button onClick={() => setActiveTab('ads')} className={`flex items-center gap-2 px-6 py-2.5 font-bold rounded-full border-2 transition-all duration-300 ${activeTab === 'ads' ? 'bg-pnj-blue text-white border-pnj-blue shadow-md' : 'bg-transparent text-pnj-blue border-pnj-blue hover:bg-pnj-blue/10'}`}>
                            <IconImage /> Thư Viện Ads Demo
                        </button>
                    </div>

                    {/* ================= TAB 1: FUNNEL REPORT ================= */}
                    {activeTab === 'funnel' && (
                        <div className="flex flex-col gap-0 relative w-full z-10 animate-[fadeIn_0.5s_ease-in-out]">
                            {/* --- STAGE 1 --- */}
                            <div className="flex flex-col items-center w-full">
                                <div className="funnel-block w-full p-8 text-center">
                                    <h3 className="text-xl font-black text-white/90 uppercase flex items-center justify-center gap-2 mb-4"><IconMegaphone /> 1. Nguồn Truy Cập Adtech</h3>
                                    <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mb-6">
                                        <div className="flex items-center gap-3 bg-white/10 px-4 py-2 rounded-2xl border border-pnj-gold/30">
                                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="Facebook" className="h-10 w-10" />
                                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Google_Ads_logo.svg" alt="Google Ads" className="h-10 w-10 bg-white rounded-full p-1" />
                                        </div>
                                        <div className="text-5xl font-black text-white text-center">{funnelData.reach} <span className="text-xl font-bold text-pnj-gold">REACH</span></div>
                                    </div>
                                    <div className="flex flex-col md:flex-row justify-center gap-4 text-left">
                                        <div className="flat-inner-card p-4 flex-1 text-center">
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">Campaign HO</p>
                                            <p className="text-3xl font-bold text-white">{funnelData.campHO}</p>
                                        </div>
                                        <div className="flat-inner-card p-4 flex-1 text-center">
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">Campaign Nhãn Hàng</p>
                                            <p className="text-3xl font-bold text-white">{funnelData.campNhan}</p>
                                        </div>
                                        <div className="flat-inner-card p-4 flex-1 text-center">
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">Local Ads</p>
                                            <p className="text-3xl font-bold text-white">{funnelData.localAds}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="py-2"><IconArrowDown /></div>
                            </div>

                            {/* --- STAGE 2 --- */}
                            <div className="flex flex-col items-center w-full">
                                <div className="funnel-block w-[95%] p-8 text-center">
                                    <h3 className="text-xl font-black text-white/90 uppercase flex items-center justify-center gap-2 mb-1"><IconMousePointer /> 2. Cơ Hội Bán Hàng</h3>
                                    <p className="text-sm text-pnj-gold mb-4 font-medium">User in Web & Lead in Inbox</p>
                                    <div className="text-4xl font-black text-white mb-6">{funnelData.interaction} <span className="text-xl font-bold text-pnj-gold">TƯƠNG TÁC</span></div>
                                    
                                    <div className="flex flex-col md:flex-row justify-center gap-4 text-left">
                                        <div className="flat-inner-card p-4 flex-1 text-center flex flex-col items-center justify-center">
                                            <div className="mb-2 text-white/80"><IconWorldWideWeb /></div>
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">User In Web</p>
                                            <p className="text-3xl font-bold text-white">{funnelData.userInWeb}</p>
                                        </div>
                                        <div className="flat-inner-card p-4 flex-[1.5] text-center flex flex-col items-center justify-center">
                                            <div className="mb-2 text-white/80"><IconEnvelope /></div>
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">Lead Inbox</p>
                                            <div className="flex justify-around mt-1 items-center w-full">
                                                <div><span className="text-white text-2xl font-bold">{funnelData.inboxHO}</span> <span className="text-sm text-white/60">HO</span></div>
                                                <div className="text-pnj-gold/50 px-2">|</div>
                                                <div><span className="text-white text-2xl font-bold">{funnelData.inboxCN}</span> <span className="text-sm text-white/60">CN</span></div>
                                            </div>
                                        </div>
                                        <div className="flat-inner-card p-4 flex-1 text-center flex flex-col items-center justify-center">
                                            <img src="https://cdn-icons-png.flaticon.com/512/2838/2838912.png" alt="Click GMB" className="h-10 w-10 mb-2 invert opacity-80" />
                                            <p className="text-pnj-gold text-xs font-bold uppercase mb-1">Click Chỉ Đường</p>
                                            <p className="text-3xl font-bold text-white">{funnelData.clickGMB}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="py-2 flex justify-center w-full"><IconArrowDown /></div>

                            {/* --- STAGE 3: CHIA 2 LUỒNG --- */}
                            <div className="w-full relative px-2 md:px-0">
                                <div className="w-full border-2 border-pnj-gold/40 rounded-2xl p-4 md:p-8 bg-pnj-blue/5 relative pt-10 mt-2 shadow-inner">
                                    <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-[#fdfbf0] px-6 py-1 border-2 border-pnj-gold rounded-full text-pnj-gold font-bold text-xs md:text-sm text-center w-max shadow-sm">
                                        CƠ HỘI BÁN HÀNG CHIA THÀNH 2 LUỒNG
                                    </div>
                                    <div className="flex flex-col md:flex-row justify-center items-stretch gap-6 w-full">
                                        {/* FLOW 1 */}
                                        <div className="w-full md:w-1/2 flex flex-col">
                                            <div className="funnel-block w-full p-6 text-center flex-1 flex flex-col h-full border-t-0 shadow-lg">
                                                <h3 className="text-xl font-black text-white uppercase flex items-center justify-center gap-2 mb-1"><IconCart /> Flow 1: Đơn Hàng</h3>
                                                <p className="text-sm text-pnj-gold mb-5 font-medium">Đã chuyển đổi thành công</p>
                                                <div className="flat-inner-card p-5 flex flex-col justify-center mb-4 flex-1 bg-white/5 border-transparent">
                                                    <div className="bg-black/30 p-3 rounded-lg mb-4 border border-pnj-gold/20">
                                                        <span className="text-white text-2xl md:text-3xl font-bold tracking-wide">{funnelData.totalRevenue} / {funnelData.totalCustomers} KH</span>
                                                    </div>
                                                    <div className="grid grid-cols-1 gap-3">
                                                        <div className="flat-inner-card bg-black/20 p-4 relative overflow-hidden text-left border-transparent">
                                                            <div className="absolute top-4 right-4 text-pnj-gold/50"><IconUsers /></div>
                                                            <p className="text-sm text-pnj-gold mb-1">Từ Khách Hàng Cũ</p>
                                                            <p className="text-2xl font-bold text-white mb-1">{funnelData.revKHC}</p>
                                                            <p className="text-xs text-white/60">{funnelData.khKHC}</p>
                                                        </div>
                                                        <div className="flat-inner-card bg-black/20 p-4 relative overflow-hidden text-left border-transparent">
                                                            <div className="absolute top-4 right-4 text-pnj-gold/50"><IconUsers /></div>
                                                            <p className="text-sm text-pnj-gold mb-1">Từ Khách Hàng Mới</p>
                                                            <p className="text-2xl font-bold text-white mb-1">{funnelData.revKHM}</p>
                                                            <p className="text-xs text-white/60">{funnelData.khKHM}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="py-1 flex justify-center"><IconArrowDown /></div>
                                                <div className="flat-inner-card bg-pnj-gold/20 p-4 rounded-xl border border-pnj-gold mt-2">
                                                    <h4 className="text-base font-bold text-white uppercase mb-1 tracking-wide">After Sale & Nurturing</h4>
                                                    <p className="text-sm text-white/80">Chăm sóc sau mua</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="md:hidden flex items-center justify-center w-full relative h-8">
                                            <div className="absolute w-full h-[1px] bg-pnj-gold/40"></div>
                                            <span className="bg-[#fdfbf0] text-pnj-gold px-4 py-1 rounded-full text-xs font-bold border-2 border-pnj-gold/50 relative z-10 shadow-sm">HOẶC</span>
                                        </div>
                                        <div className="hidden md:block w-[2px] bg-pnj-gold/20 mx-2 my-10 rounded-full"></div>

                                        {/* FLOW 2 */}
                                        <div className="w-full md:w-1/2 flex flex-col">
                                            <div className="funnel-block w-full p-6 text-center flex flex-col h-full border-t-0 shadow-lg">
                                                <h3 className="text-xl font-black text-white uppercase flex items-center justify-center gap-2 mb-1"><IconUsers /> Flow 2: Qualified Leads</h3>
                                                <p className="text-sm text-pnj-gold mb-5 font-medium">Khách hàng cần tư vấn thêm</p>
                                                <div className="flat-inner-card p-6 flex flex-col justify-center items-center flex-1 bg-white/5 border-transparent">
                                                    <div className="bg-black/30 w-full rounded-xl p-5 mb-4 border border-pnj-gold/20">
                                                        <h4 className="text-lg md:text-xl font-black text-pnj-gold uppercase flex items-center justify-center gap-2 mb-2"><IconStore /> O2O Flow: Chăm sóc 1-1</h4>
                                                        <p className="text-sm text-white/90 leading-relaxed border-t border-pnj-gold/20 pt-3 mt-3">Chuyển giao tệp Qualified Lead (SĐT) chưa mua đến Chi Nhánh.</p>
                                                    </div>
                                                    <div className="flex flex-wrap justify-center gap-2 mt-2 w-full">
                                                        {['Hồ Chí Minh', 'Đông Nam Bộ', 'Miền Bắc', 'Miền Tây', 'Miền Trung', 'Tây Nguyên'].map(cn => (
                                                            <span key={cn} className="px-3 py-2 w-[45%] lg:w-[30%] text-center bg-white/10 text-white text-xs md:text-sm font-bold rounded-lg border border-white/20">{cn}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================= TAB 2: THƯ VIỆN ADS DEMO ================= */}
                    {activeTab === 'ads' && (
                        <div className="flex flex-col gap-6 relative z-10 animate-[fadeIn_0.5s_ease-in-out]">
                            
                            {/* Danh sách Phân khu theo Kênh (Facebook, Google, Zalo) */}
                            {['Facebook', 'Google', 'Zalo'].map(channel => {
                                const channelAds = adsData.filter(ad => ad.channel === channel);
                                if (channelAds.length === 0) return null;
                                
                                return (
                                    <div key={channel} className="w-full bg-white/60 p-4 rounded-xl border border-pnj-gold/30 shadow-sm backdrop-blur-sm">
                                        <h3 className="text-pnj-blue font-black uppercase text-lg md:text-xl mb-4 flex items-center gap-2">
                                            <span className="w-2 h-6 bg-pnj-gold rounded-full"></span>
                                            KÊNH DEMO: {channel}
                                        </h3>
                                        <div className="flex overflow-x-auto gap-4 pb-4 hide-scrollbar snap-x snap-mandatory">
                                            {channelAds.map((ad) => (
                                                <div key={ad.id} className="snap-center flex-shrink-0 w-[85vw] sm:w-[350px] flex flex-col bg-pnj-blue rounded-xl overflow-hidden border border-pnj-gold/40 shadow-lg">
                                                    <div className="w-full h-[200px] sm:h-[250px] bg-black relative flex items-center justify-center p-2">
                                                        <img src={ad.image} alt={ad.title} className="max-h-full max-w-full object-contain" />
                                                    </div>
                                                    <div className="p-4 flex flex-col flex-1 text-white">
                                                        <div className="flex flex-wrap gap-2 mb-2">
                                                            <span className="px-2 py-1 bg-white text-pnj-blue text-[10px] font-black uppercase rounded border border-white">{ad.channel}</span>
                                                            <span className="px-2 py-1 bg-pnj-gold/20 text-pnj-gold text-[10px] font-bold uppercase rounded border border-pnj-gold">{ad.campaign}</span>
                                                        </div>
                                                        <h4 className="text-base sm:text-lg font-black mb-2 leading-tight">{ad.title}</h4>
                                                        <div className="mt-auto pt-3 border-t border-pnj-gold/30">
                                                            <p className="text-[11px] text-pnj-gold uppercase font-bold mb-0.5">Định dạng:</p>
                                                            <p className="text-sm text-white/90">{ad.format}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )
                            })}

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
